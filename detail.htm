<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country Detail</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gradient-to-br from-gray-100 to-gray-200 min-h-screen p-6">


    <button onclick="history.back()" class="bg-blue-500 hover:bg-blue-700 text-white font-normal py-2 px-4 rounded-full">
  <i class="fa-solid fa-circle-chevron-left" style="color: rgb(255, 255, 255);"></i>
        BACK
</button>
    <div id="app" class="max-w-5xl mx-auto">
    </div>

    <script>
        const app = document.getElementById("app");
        let baseurl = "https://restcountries.com/v3.1/";

        const params = new URLSearchParams(window.location.search);
        const code = params.get("code");

        async function getCountry() {
            let res = await fetch(`${baseurl}alpha/${code}`);
            let data = await res.json();
            render(data[0]);
        }

        function render(c) {
            app.innerHTML += `
    <div class="bg-white rounded-3xl shadow-xl p-6 space-y-6 animate-fade-in">

        <!-- HEADER -->
        <div class="flex flex-col md:flex-row items-center gap-6">
            <img src="${c.flags.png}" 
                 class="w-40 rounded-xl shadow-md hover:scale-105 transition duration-300"/>

            <div>
                <h1 class="text-3xl font-bold">${c.name.common}</h1>
                <p class="text-gray-500">${c.name.official}</p>
                <p class="text-2xl">${c.flag}</p>
            </div>

            <img src="${c.coatOfArms?.png || ""}" 
                 class="w-24 ml-auto opacity-80"/>
        </div>

        <!-- BASIC INFO -->
        <div class="grid md:grid-cols-2 gap-4 text-sm">

            <div class="bg-gray-50 p-4 rounded-xl hover:shadow transition">
                <p><b>Region:</b> ${c.region} (${c.subregion})</p>
                <p><b>Capital:</b> ${c.capital?.[0]}</p>
                <p><b>Population:</b> ${c.population.toLocaleString()}</p>
                <p><b>Area:</b> ${c.area} km²</p>
                <p><b>Independent:</b> ${c.independent}</p>
                <p><b>UN Member:</b> ${c.unMember}</p>
            </div>

            <div class="bg-gray-50 p-4 rounded-xl hover:shadow transition">
                <p><b>CCA2:</b> ${c.cca2}</p>
                <p><b>CCA3:</b> ${c.cca3}</p>
                <p><b>CIoC:</b> ${c.cioc}</p>
                <p><b>FIFA:</b> ${c.fifa}</p>
                <p><b>TLD:</b> ${c.tld.join(", ")}</p>
                <p><b>Status:</b> ${c.status}</p>
            </div>

        </div>

        <!-- EXTRA -->
        <div class="grid md:grid-cols-2 gap-4 text-sm">

            <div class="bg-gray-50 p-4 rounded-xl">
                <p><b>Languages:</b> ${Object.values(c.languages || {}).join(", ")}</p>

                <p><b>Currencies:</b> ${Object.values(c.currencies || {})
                    .map(x => `${x.name} (${x.symbol})`)
                    .join(", ")
                }</p>

                <p><b>Timezones:</b> ${c.timezones.join(", ")}</p>

                <p><b>Start of week:</b> ${c.startOfWeek}</p>

                <p><b>Driving side:</b> ${c.car.side}</p>
            </div>

            <div class="bg-gray-50 p-4 rounded-xl">
                <p><b>Lat/Lng:</b> ${c.latlng.join(", ")}</p>

                <p><b>IDD:</b> ${c.idd.root}${c.idd.suffixes?.[0]}</p>

                <p><b>Postal Code:</b> ${c.postalCode?.format || "N/A"}</p>

                <p><b>Gini:</b> ${c.gini ? Object.values(c.gini)[0] : "N/A"
                }</p>

                <p><b>Continents:</b> ${c.continents.join(", ")}</p>
            </div>

        </div>

        <!-- BORDERS -->
        <div class="bg-gray-50 p-4 rounded-xl">
            <p class="mb-2 font-semibold">Borders:</p>
            <div class="flex flex-wrap gap-2">
                ${c.borders?.length
                    ? c.borders.map(b => `
                        <a href="detail.htm?code=${b}" 
                           class="px-3 py-1 bg-blue-100 text-blue-600 rounded-full hover:bg-blue-200 transition">
                           ${b}
                        </a>`).join("")
                    : "No borders"
                }
            </div>
        </div>

        <!-- MAP -->
        <div>
            <a href="${c.maps.googleMaps}" target="_blank"
               class="block text-center bg-blue-500 text-white py-2 rounded-xl hover:bg-blue-600 transition">
               Open in Google Maps
            </a>
        </div>

        <!-- TRANSLATIONS -->
        <div class="bg-gray-50 p-4 rounded-xl max-h-60 overflow-y-auto">
            <p class="font-semibold mb-2">Translations:</p>
            ${Object.entries(c.translations || {})
                    .map(([k, v]) => `<p><b>${k}:</b> ${v.common}</p>`)
                    .join("")}
        </div>

    </div>

    <style>
        .animate-fade-in {
            animation: fadeIn 0.6s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px);}
            to { opacity: 1; transform: translateY(0);}
        }
    </style>
    `;
        }

        getCountry();
    </script>

</body>

</html>
